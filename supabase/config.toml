# Minimal Hubly Supabase config — per-function Edge Function flags.
# Google redirects here without a user JWT; CSRF state is validated in-function.

[functions.google-calendar-oauth-callback]
verify_jwt = false

# Google Calendar push notifications have no Hubly JWT
[functions.google-calendar-webhook]
verify_jwt = false

# Cron / maintain uses HUBLY_CRON_SECRET or service-role bearer (checked in-function)
[functions.google-calendar-maintain]
verify_jwt = false

# Stripe webhooks have no Hubly JWT — verified via Stripe-Signature in-function
[functions.stripe-webhook]
verify_jwt = false

# Public booking checkout (optional session); ownership checked via business + Connect account
[functions.create-booking-checkout]
verify_jwt = false

# Marketplace API — public list/availability/book/request; settings auth checked in-function
[functions.marketplace]
verify_jwt = false

# HublyAI status probe — reports which providers are configured; no secrets returned
[functions.hubly-ai-status]
verify_jwt = false

# Customer Runtime — public AI concierge entry (auth optional for persistence)
[functions.hubly-find-pro]
verify_jwt = false

# Hubly Daily — morning briefing (auth optional when memory/dna provided in body)
[functions.hubly-daily]
verify_jwt = false

# Mission Control — internal admin OS; secret checked in-function (UI name: Hubly HQ)
[functions.mission-control]
verify_jwt = false

# Hubly.buildBusiness — dry_run may be unauthenticated; persist path checks owner JWT in-function
[functions.hubly-build-business]
verify_jwt = false

# hire-crm — owner JWT checked in-function; CRM write uses service role
[functions.hire-crm]
verify_jwt = false
