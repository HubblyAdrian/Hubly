<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hubly · What can we help you get done?</title>
<meta name="description" content="Tell Hubly what you need. Our AI concierge finds the right pro and gets you booked — no searching directories.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23141B2B'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='28' fill='%23D9632D'%3Eh%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#D9632D;
  --brand-dark:#B84E1F;
  --navy:#141B2B;
  --ink:#1a1f2e;
  --ink-2:#4a5163;
  --ink-3:#7a8294;
  --line:rgba(20,27,43,.10);
  --surface:rgba(255,255,255,.82);
  --font:'DM Sans',system-ui,sans-serif;
  --display:'Plus Jakarta Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:var(--font);
  color:var(--ink);
  background:
    radial-gradient(1200px 700px at 12% -10%, rgba(217,99,45,.18), transparent 55%),
    radial-gradient(900px 600px at 90% 10%, rgba(20,27,43,.10), transparent 50%),
    linear-gradient(165deg, #f7f3ee 0%, #eef2f7 42%, #f4ebe4 100%);
  -webkit-font-smoothing:antialiased;
}
.hubly-mark{display:block;height:clamp(44px,6vw,64px);width:auto;object-fit:contain}
a{color:inherit}

.shell{
  width:min(720px, calc(100% - 32px));
  margin:0 auto;
  padding:28px 0 72px;
}
.layout{
  display:grid;
  gap:20px;
}
@media (min-width:860px){
  .layout{
    grid-template-columns:minmax(0,1fr) 240px;
    align-items:start;
  }
  .booking-panel{position:sticky;top:16px}
}
.top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:clamp(24px,5vh,48px);
  opacity:0;animation:rise .7s .05s ease forwards;
}
.top-link{
  font-size:13px;font-weight:600;color:var(--ink-2);
  text-decoration:none;border-bottom:1px solid transparent;
}
.top-link:hover{border-color:var(--ink-3)}

.hero{text-align:center;opacity:0;animation:rise .75s .12s ease forwards}
.hero .mark-wrap{display:flex;justify-content:center;margin-bottom:22px}
.hero h1{
  font-family:var(--display);
  font-weight:800;
  font-size:clamp(1.55rem, 4.2vw, 2.35rem);
  letter-spacing:-.03em;
  line-height:1.15;
  color:var(--navy);
  margin-bottom:10px;
}
.hero p{
  font-size:clamp(15px, 2.2vw, 17px);
  color:var(--ink-2);
  max-width:36ch;
  margin:0 auto 28px;
  line-height:1.45;
}

.composer{
  background:var(--surface);
  backdrop-filter:blur(14px);
  border:1px solid var(--line);
  border-radius:22px;
  padding:14px 14px 12px;
  box-shadow:0 18px 50px rgba(20,27,43,.08);
  text-align:left;
  opacity:0;animation:rise .8s .22s ease forwards;
}
.composer textarea{
  width:100%;
  min-height:96px;
  resize:none;
  border:0;
  outline:none;
  background:transparent;
  font:inherit;
  font-size:17px;
  line-height:1.45;
  color:var(--ink);
  padding:8px 8px 4px;
}
.composer textarea::placeholder{color:var(--ink-3)}
.composer-bar{
  display:flex;align-items:center;justify-content:flex-end;gap:10px;
  padding-top:8px;border-top:1px solid var(--line);margin-top:6px;
}
.btn{
  appearance:none;border:0;cursor:pointer;
  font-family:var(--display);font-weight:700;font-size:14px;
  border-radius:12px;padding:11px 18px;
  transition:transform .15s ease, background .15s ease, opacity .15s ease;
}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-brand{background:var(--brand);color:#fff}
.btn-brand:hover{background:var(--brand-dark)}
.btn-ghost{
  background:transparent;color:var(--ink-2);
  border:1px solid var(--line);padding:10px 14px;
}
.btn-ghost:hover{background:rgba(20,27,43,.04)}

.prompts{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px 10px;
  margin-top:18px;
  opacity:0;animation:rise .8s .34s ease forwards;
}
.prompt{
  appearance:none;border:0;cursor:pointer;
  background:transparent;
  color:var(--ink-2);
  font:inherit;font-size:13px;font-weight:600;
  padding:6px 2px;
  border-bottom:1px solid rgba(20,27,43,.18);
  transition:color .15s ease, border-color .15s ease;
}
.prompt:hover{color:var(--brand);border-color:var(--brand)}

.thread{margin-top:28px;display:grid;gap:12px}
.bubble{
  max-width:92%;
  padding:14px 16px;
  border-radius:16px;
  font-size:15px;line-height:1.5;
  white-space:pre-wrap;
  opacity:0;animation:rise .45s ease forwards;
}
.bubble.user{
  margin-left:auto;
  background:var(--navy);color:#fff;
  border-bottom-right-radius:6px;
}
.bubble.hubly{
  margin-right:auto;
  background:rgba(255,255,255,.9);
  border:1px solid var(--line);
  border-bottom-left-radius:6px;
  color:var(--ink);
}
.followups{display:grid;gap:8px;margin-top:4px}
.followups button{
  text-align:left;
  appearance:none;cursor:pointer;
  background:rgba(255,255,255,.75);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
  font:inherit;font-size:14px;font-weight:600;color:var(--ink);
  transition:border-color .15s ease, transform .15s ease;
}
.followups button:hover{border-color:var(--brand);transform:translateY(-1px)}

.booking-panel{
  display:none;
  background:rgba(255,255,255,.9);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px 14px 12px;
  box-shadow:0 10px 28px rgba(20,27,43,.06);
}
.booking-panel.visible{display:block;animation:rise .4s ease}
.booking-panel h3{
  font-family:var(--display);font-size:13px;font-weight:800;
  color:var(--navy);margin-bottom:10px;letter-spacing:-.01em;
}
.booking-panel ul{list-style:none;display:grid;gap:7px}
.booking-panel li{
  font-size:13px;font-weight:600;color:var(--ink-2);
  display:flex;gap:8px;align-items:flex-start;
}
.booking-panel li .mark{
  flex-shrink:0;width:16px;text-align:center;
  color:var(--brand);font-weight:800;
}
.booking-panel li.pending{color:var(--ink-3);font-weight:500}
.booking-panel li.pending .mark{color:var(--ink-3)}

.confirm-card{
  margin-right:auto;
  max-width:100%;
  background:rgba(255,255,255,.94);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px 16px 14px;
  box-shadow:0 12px 32px rgba(20,27,43,.06);
  opacity:0;animation:rise .45s ease forwards;
}
.confirm-card h4{
  font-family:var(--display);font-size:1.1rem;font-weight:800;
  color:var(--navy);letter-spacing:-.02em;margin-bottom:12px;
}
.confirm-rows{display:grid;gap:8px;margin-bottom:12px}
.confirm-row{
  display:grid;grid-template-columns:120px 1fr;gap:8px;
  font-size:14px;
}
.confirm-row .k{color:var(--ink-3);font-weight:600}
.confirm-row .v{color:var(--ink);font-weight:700}
.confirm-row.pending .v{color:var(--ink-3);font-weight:500}
.confirm-ask{
  font-size:13px;color:var(--ink-3);margin-bottom:12px;
}
.confirm-actions{display:flex;flex-wrap:wrap;gap:8px}

.matches{margin-top:36px}
.matches-h{
  font-family:var(--display);font-weight:800;font-size:1.4rem;
  letter-spacing:-.02em;color:var(--navy);
  margin-bottom:6px;
  opacity:0;animation:rise .5s ease forwards;
}
.matches-sub{
  font-size:14px;color:var(--ink-2);line-height:1.45;
  margin-bottom:18px;
  opacity:0;animation:rise .55s .05s ease forwards;
}
.rec-list{display:grid;gap:18px}

.rec{
  background:rgba(255,255,255,.92);
  border:1px solid var(--line);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 14px 40px rgba(20,27,43,.06);
  opacity:0;animation:rise .55s ease forwards;
}
.rec:nth-child(1){animation-delay:.06s}
.rec:nth-child(2){animation-delay:.14s}
.rec:nth-child(3){animation-delay:.22s}

.rec-hero{
  position:relative;
  height:148px;
  background:
    linear-gradient(135deg, rgba(20,27,43,.55), rgba(217,99,45,.35)),
    linear-gradient(160deg, #2a3348, #1a2233);
  background-size:cover;
  background-position:center;
}
.rec-hero.has-img{background-color:#1a2233}
.rec-role{
  position:absolute;left:14px;top:14px;
  font-family:var(--display);font-weight:800;font-size:12px;
  letter-spacing:.02em;
  background:rgba(255,255,255,.95);color:var(--navy);
  padding:6px 10px;border-radius:999px;
}
.rec-body{padding:0 18px 18px}
.rec-identity{
  display:flex;align-items:flex-end;gap:12px;
  margin-top:-28px;margin-bottom:12px;
}
.rec-logo{
  width:56px;height:56px;border-radius:14px;
  object-fit:cover;background:#fff;
  border:3px solid #fff;
  box-shadow:0 6px 16px rgba(20,27,43,.12);
  flex-shrink:0;
}
.rec-logo.placeholder{
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:18px;
  color:var(--brand);background:#fff;
}
.rec-name-wrap{padding-bottom:2px;min-width:0;flex:1}
.rec-name{
  font-family:var(--display);font-weight:800;font-size:1.1rem;
  color:var(--navy);line-height:1.2;
}
.rec-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.badge{
  font-size:11px;font-weight:700;
  padding:4px 8px;border-radius:999px;
  background:rgba(20,27,43,.06);color:var(--ink-2);
}
.badge.verified{background:rgba(46,204,113,.14);color:#1a7a40}
.badge.conf{background:rgba(217,99,45,.12);color:var(--brand-dark)}
.badge.instant{background:rgba(26,79,160,.10);color:#1a4fa0}

.rec-facts{
  display:flex;flex-wrap:wrap;gap:8px 14px;
  font-size:13px;color:var(--ink-2);
  margin:10px 0 12px;
}
.rec-facts span{white-space:nowrap}

.ai-box{
  background:rgba(20,27,43,.03);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:14px;
}
.ai-box h3{
  font-family:var(--display);font-size:12px;font-weight:800;
  letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);
  margin-bottom:8px;
}
.ai-box .summary{
  font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;
  margin-bottom:8px;
}
.ai-box ul{list-style:none;display:grid;gap:5px}
.ai-box li{
  font-size:13px;color:var(--ink-2);
  padding-left:14px;position:relative;
}
.ai-box li::before{
  content:"";position:absolute;left:0;top:.55em;
  width:6px;height:6px;border-radius:50%;background:var(--brand);
}

.more-wrap{margin-top:28px}
.more-toggle{
  width:100%;
  text-align:left;
  appearance:none;cursor:pointer;
  background:transparent;
  border:0;
  padding:8px 0;
  font-family:var(--display);font-weight:700;font-size:14px;
  color:var(--ink-2);
  border-bottom:1px solid var(--line);
}
.more-toggle:hover{color:var(--brand)}
.more-list{display:none;grid-gap:18px;margin-top:16px}
.more-list.open{display:grid}

.book-panel{
  display:none;margin-top:12px;padding-top:12px;
  border-top:1px solid var(--line);
}
.book-panel.open{display:block;animation:rise .35s ease}
.book-panel .row{display:grid;gap:8px;margin-bottom:8px}
.book-panel input{
  width:100%;border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;font:inherit;font-size:14px;background:#fff;
  outline:none;
}
.book-panel input:focus{border-color:rgba(217,99,45,.55)}
.status{
  margin-top:10px;font-size:13px;color:var(--ink-3);min-height:1.2em;
}
.status.err{color:#b02a2a}
.status.ok{color:#1a7a40}

@keyframes rise{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}

@media (max-width:520px){
  .shell{width:calc(100% - 24px);padding-top:18px}
  .composer textarea{min-height:110px;font-size:16px}
  .rec-hero{height:128px}
}
</style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <a href="/" aria-label="Hubly home">
        <img class="hubly-mark" src="/assets/hubly-wordmark.png" alt="hubly" style="height:28px">
      </a>
      <a class="top-link" href="/">For businesses</a>
    </header>

    <div class="layout">
      <div class="main-col">
        <section class="hero" id="entry">
          <div class="mark-wrap">
            <img class="hubly-mark" src="/assets/hubly-wordmark.png" alt="hubly">
          </div>
          <h1>What can we help you get done today?</h1>
          <p>Describe the job. Hubly finds the right pro and gets you booked — you don’t search.</p>

          <div class="composer">
            <textarea id="need-input" placeholder="Describe what you need..." rows="3" autocomplete="off"></textarea>
            <div class="composer-bar">
              <button type="button" class="btn btn-brand" id="send-btn">Continue</button>
            </div>
          </div>

          <div class="prompts" id="prompts" aria-label="Suggested requests"></div>
        </section>

        <div class="thread" id="thread" hidden></div>
        <div class="matches" id="matches" hidden></div>
        <div class="status" id="status"></div>
      </div>

      <aside class="booking-panel" id="booking-panel" aria-live="polite">
        <h3 id="booking-title">Building Your Booking</h3>
        <ul id="booking-list"></ul>
      </aside>
    </div>
  </div>

<script>
(function () {
  const SUPA_URL = 'https://rtwxxkxpkqdrhclkozma.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0d3h4a3hwa3FkcmhjbGtvem1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MjA4MjgsImV4cCI6MjA5Nzk5NjgyOH0.ky9ycGJ621E4ab078pCIR4-1X_XS6OUpfPmH3v8tzf8';
  const DEFAULT_PROMPTS = [
    'I just bought a used truck and it smells like smoke',
    "My windows haven't been cleaned in years",
    'My AC stopped working',
    'My driveway has oil stains',
    'I need a wedding photographer',
  ];

  const input = document.getElementById('need-input');
  const sendBtn = document.getElementById('send-btn');
  const promptsEl = document.getElementById('prompts');
  const threadEl = document.getElementById('thread');
  const matchesEl = document.getElementById('matches');
  const statusEl = document.getElementById('status');
  const bookingPanel = document.getElementById('booking-panel');
  const bookingTitle = document.getElementById('booking-title');
  const bookingList = document.getElementById('booking-list');

  let messages = [];
  let lastNeed = null;
  let busy = false;

  function renderBookingPanel(booking, confirmed) {
    if (!booking || !(booking.checklist || []).length) {
      bookingPanel.classList.remove('visible');
      return;
    }
    bookingPanel.classList.add('visible');
    bookingTitle.textContent = confirmed
      ? 'Your Booking'
      : (booking.title || 'Building Your Booking');
    bookingList.innerHTML = (booking.checklist || []).map((item) => {
      const done = !!item.done;
      return '<li class="' + (done ? '' : 'pending') + '">' +
        '<span class="mark" aria-hidden="true">' + (done ? '✓' : '□') + '</span>' +
        '<span>' + escapeHtml(item.label) + '</span></li>';
    }).join('');
  }

  function setStatus(text, kind) {
    statusEl.textContent = text || '';
    statusEl.className = 'status' + (kind ? ' ' + kind : '');
  }

  function escapeHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderPrompts(list) {
    promptsEl.innerHTML = '';
    (list || DEFAULT_PROMPTS).forEach((text) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'prompt';
      b.textContent = text;
      b.addEventListener('click', () => {
        input.value = text;
        input.focus();
        submitNeed(text);
      });
      promptsEl.appendChild(b);
    });
  }

  function addBubble(role, text) {
    threadEl.hidden = false;
    const div = document.createElement('div');
    div.className = 'bubble ' + (role === 'user' ? 'user' : 'hubly');
    div.textContent = text;
    threadEl.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showFollowUps(questions) {
    if (!questions || !questions.length) return;
    const wrap = document.createElement('div');
    wrap.className = 'followups';
    questions.forEach((q) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = q;
      b.addEventListener('click', () => {
        wrap.remove();
        input.value = q;
        submitNeed(q);
      });
      wrap.appendChild(b);
    });
    threadEl.appendChild(wrap);
  }

  function showConfirmation(confirmation, need, booking) {
    const summary = confirmation && confirmation.summary;
    const rows = (summary && summary.rows) || [];
    const pending = (summary && summary.pending) || [
      { label: 'Appointment', value: 'To be selected' },
      { label: 'Provider', value: 'To be selected' },
    ];
    if (!rows.length && !((confirmation && confirmation.bullets) || []).length) return;

    renderBookingPanel(booking, true);

    const box = document.createElement('div');
    box.className = 'confirm-card';
    let body = '';
    if (rows.length) {
      body = '<div class="confirm-rows">' +
        rows.map((r) =>
          '<div class="confirm-row"><span class="k">' + escapeHtml(r.label) +
          '</span><span class="v">' + escapeHtml(r.value) + '</span></div>'
        ).join('') +
        pending.map((r) =>
          '<div class="confirm-row pending"><span class="k">' + escapeHtml(r.label) +
          '</span><span class="v">' + escapeHtml(r.value) + '</span></div>'
        ).join('') +
        '</div>';
    } else {
      body = '<div class="confirm-rows">' +
        (confirmation.bullets || []).map((b) =>
          '<div class="confirm-row"><span class="k"></span><span class="v">' +
          escapeHtml(b) + '</span></div>'
        ).join('') + '</div>';
    }
    box.innerHTML =
      '<h4>' + escapeHtml((summary && summary.title) || confirmation.headline || 'Your Booking') + '</h4>' +
      body +
      '<div class="confirm-ask">Ready to find the right pro?</div>' +
      '<div class="confirm-actions">' +
        '<button type="button" class="btn btn-brand" data-act="good">Looks good</button>' +
        '<button type="button" class="btn btn-ghost" data-act="continue">Continue</button>' +
        '<button type="button" class="btn btn-ghost" data-act="edit">Edit</button>' +
        '<button type="button" class="btn btn-ghost" data-act="add">Add another service</button>' +
      '</div>';
    threadEl.hidden = false;
    threadEl.appendChild(box);

    const goMatch = async () => {
      box.querySelector('.confirm-actions').innerHTML =
        '<span style="font-size:13px;color:var(--ink-3)">Finding the right pros…</span>';
      await runMatch(need);
    };
    box.querySelector('[data-act="good"]').addEventListener('click', goMatch);
    box.querySelector('[data-act="continue"]').addEventListener('click', goMatch);
    box.querySelector('[data-act="edit"]').addEventListener('click', () => {
      box.remove();
      renderBookingPanel(booking, false);
      addBubble('hubly', 'What should we change?');
      input.focus();
    });
    box.querySelector('[data-act="add"]').addEventListener('click', () => {
      box.remove();
      renderBookingPanel(booking, false);
      addBubble('hubly', 'What else should we add?');
      input.focus();
    });
  }

  async function api(body) {
    const res = await fetch(SUPA_URL + '/functions/v1/marketplace', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        apikey: SUPA_KEY,
        Authorization: 'Bearer ' + SUPA_KEY,
      },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Something went wrong');
    return data;
  }

  function money(n) {
    if (n == null || !Number.isFinite(Number(n))) return null;
    return '$' + Math.round(Number(n));
  }

  function initials(name) {
    const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return 'H';
    return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
  }

  function bindBooking(cardEl, m) {
    const panel = cardEl.querySelector('.book-panel');
    const cta = m.cta || (m.instant_book ? 'Book Now' : 'Request Booking');
    cardEl.querySelector('.book-cta').addEventListener('click', () => {
      panel.classList.toggle('open');
    });
    cardEl.querySelector('.bk-submit').addEventListener('click', async () => {
      const st = cardEl.querySelector('.bk-status');
      const name = cardEl.querySelector('.bk-name').value.trim();
      if (!name) {
        st.textContent = 'Name is required';
        st.className = 'status err bk-status';
        return;
      }
      st.textContent = 'Sending…';
      st.className = 'status bk-status';
      try {
        const action = m.instant_book ? 'book' : 'request';
        await api({
          action,
          provider_id: m.provider_id,
          business_id: m.business_id,
          customer_name: name,
          customer_email: cardEl.querySelector('.bk-email').value.trim(),
          customer_phone: cardEl.querySelector('.bk-phone').value.trim(),
          service_name: (lastNeed && lastNeed.service_text) || '',
          service_interest: (lastNeed && lastNeed.service_text) || '',
          requested_date: cardEl.querySelector('.bk-date').value.trim(),
          preferred_date: cardEl.querySelector('.bk-date').value.trim(),
          notes: (lastNeed && lastNeed.notes) || '',
        });
        st.textContent = m.instant_book
          ? 'Booking sent — they’ll confirm shortly.'
          : 'Booking request sent.';
        st.className = 'status ok bk-status';
      } catch (e) {
        st.textContent = e.message || 'Could not complete booking';
        st.className = 'status err bk-status';
      }
    });
  }

  function renderCard(m) {
    const card = document.createElement('article');
    card.className = 'rec';
    const cta = m.cta || (m.instant_book ? 'Book Now' : 'Request Booking');
    const start = money(m.starting_at);
    const rating = m.rating != null ? ('★ ' + Number(m.rating).toFixed(1)) : null;
    const reviews = m.review_count ? (m.review_count + ' reviews') : null;
    const years = m.years_in_business != null ? (m.years_in_business + '+ years') : null;
    const conf = m.confidence_label || 'Recommended for your job';
    const role = m.role || 'Hubly Match';
    const why = (m.why || []).map((w) => '<li>' + escapeHtml(w) + '</li>').join('');
    const heroStyle = m.hero_photo
      ? 'background-image:linear-gradient(180deg,rgba(20,27,43,.15),rgba(20,27,43,.55)),url(\'' + String(m.hero_photo).replace(/'/g, '%27') + '\')'
      : '';
    const logoHtml = m.logo_url
      ? '<img class="rec-logo" src="' + escapeHtml(m.logo_url) + '" alt="">'
      : '<div class="rec-logo placeholder" aria-hidden="true">' + escapeHtml(initials(m.name)) + '</div>';

    const facts = [
      rating,
      reviews,
      start ? ('Starting at ' + start) : null,
      m.available_label,
      m.distance_label,
      years,
    ].filter(Boolean).map((f) => '<span>' + escapeHtml(f) + '</span>').join('');

    card.innerHTML =
      '<div class="rec-hero' + (m.hero_photo ? ' has-img' : '') + '" style="' + heroStyle + '">' +
        '<div class="rec-role">' + escapeHtml(role) + '</div>' +
      '</div>' +
      '<div class="rec-body">' +
        '<div class="rec-identity">' + logoHtml +
          '<div class="rec-name-wrap">' +
            '<div class="rec-name">' + escapeHtml(m.name) + '</div>' +
            '<div class="rec-badges">' +
              (m.verified ? '<span class="badge verified">Verified</span>' : '') +
              '<span class="badge conf">' + escapeHtml(conf) + '</span>' +
              (m.instant_book ? '<span class="badge instant">Instant Book</span>' : '') +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="rec-facts">' + facts + '</div>' +
        '<div class="ai-box">' +
          '<h3>Why Hubly recommends them</h3>' +
          (m.summary ? '<div class="summary">' + escapeHtml(m.summary) + '</div>' : '') +
          '<ul>' + why + '</ul>' +
        '</div>' +
        '<button type="button" class="btn btn-brand book-cta">' + escapeHtml(cta) + '</button>' +
        '<div class="book-panel">' +
          '<div class="row"><input class="bk-name" placeholder="Your name" autocomplete="name"></div>' +
          '<div class="row"><input class="bk-email" placeholder="Email" type="email" autocomplete="email"></div>' +
          '<div class="row"><input class="bk-phone" placeholder="Phone" type="tel" autocomplete="tel"></div>' +
          '<div class="row"><input class="bk-date" placeholder="Preferred date (YYYY-MM-DD)"></div>' +
          '<button type="button" class="btn btn-brand bk-submit">' + escapeHtml(cta) + '</button>' +
          '<div class="status bk-status"></div>' +
        '</div>' +
      '</div>';

    bindBooking(card, m);
    return card;
  }

  function renderMatches(payload) {
    matchesEl.hidden = false;
    const headline = payload.headline || 'We found your best matches.';
    const subhead = payload.subhead || 'Hubly already narrowed this down — here’s who we’d book for your job.';
    const primary = payload.recommendations || payload.matches || [];
    const more = payload.more_providers || [];
    const moreLabel = payload.more_label || 'We found a few more providers that may also be a good fit.';

    matchesEl.innerHTML =
      '<div class="matches-h">' + escapeHtml(headline) + '</div>' +
      '<div class="matches-sub">' + escapeHtml(subhead) + '</div>' +
      '<div class="rec-list" id="rec-primary"></div>' +
      (more.length
        ? '<div class="more-wrap">' +
            '<button type="button" class="more-toggle" id="more-toggle">' + escapeHtml(moreLabel) + '</button>' +
            '<div class="more-list" id="more-list"></div>' +
          '</div>'
        : '');

    const list = matchesEl.querySelector('#rec-primary');
    if (!primary.length) {
      list.innerHTML = '<p style="color:var(--ink-2);font-size:14px;">No strong matches yet. Add a city or timing and try again.</p>';
      return;
    }
    primary.forEach((m) => list.appendChild(renderCard(m)));

    if (more.length) {
      const moreList = matchesEl.querySelector('#more-list');
      const toggle = matchesEl.querySelector('#more-toggle');
      more.forEach((m) => moreList.appendChild(renderCard(m)));
      toggle.addEventListener('click', () => {
        const open = moreList.classList.toggle('open');
        toggle.textContent = open
          ? 'Hide additional providers'
          : moreLabel;
      });
    }

    matchesEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  async function runMatch(need) {
    setStatus('Finding the right pros for you…');
    const payload = await api({ action: 'match', need: need || {} });
    lastNeed = payload.need || need;
    setStatus('');
    renderMatches(payload);
  }

  async function submitNeed(text) {
    const prompt = String(text || input.value || '').trim();
    if (!prompt || busy) return;
    busy = true;
    sendBtn.disabled = true;
    setStatus('');
    promptsEl.style.display = 'none';
    messages.push({ role: 'user', content: prompt });
    addBubble('user', prompt);
    input.value = '';
    try {
      const intake = await api({ action: 'intake', messages });
      if (intake.booking) renderBookingPanel(intake.booking, false);
      if (intake.reply) {
        messages.push({ role: 'assistant', content: intake.reply });
        addBubble('hubly', intake.reply);
      }
      lastNeed = intake.need || null;
      if (intake.job && intake.job.vehicle_type && lastNeed) {
        lastNeed.vehicle_type = intake.job.vehicle_type;
      }
      if (intake.ready_to_confirm && intake.confirmation) {
        showConfirmation(intake.confirmation, lastNeed, intake.booking);
      } else if (intake.ready_to_match) {
        await runMatch(intake.need);
      } else {
        showFollowUps(intake.follow_ups || []);
        if (intake.suggested_prompts) renderPrompts(intake.suggested_prompts);
      }
    } catch (e) {
      setStatus(e.message || 'Could not continue', 'err');
    } finally {
      busy = false;
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', () => submitNeed());
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitNeed();
    }
  });

  renderPrompts(DEFAULT_PROMPTS);
  api({ action: 'intake' }).then((boot) => {
    if (boot && boot.suggested_prompts) renderPrompts(boot.suggested_prompts);
  }).catch(() => {});
})();
</script>
</body>
</html>
