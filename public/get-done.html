<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hubly · What can we help you get done?</title>
<meta name="description" content="Tell Hubly what you need. Our AI concierge finds the right pro and gets you booked — no searching directories.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23141B2B'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='800' font-size='28' fill='%23D9632D'%3Eh%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#D9632D;
  --brand-dark:#B84E1F;
  --navy:#141B2B;
  --ink:#1a1f2e;
  --ink-2:#4a5163;
  --ink-3:#7a8294;
  --line:rgba(20,27,43,.10);
  --surface:rgba(255,255,255,.82);
  --font:'DM Sans',system-ui,sans-serif;
  --display:'Plus Jakarta Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:var(--font);
  color:var(--ink);
  background:
    radial-gradient(1200px 700px at 12% -10%, rgba(217,99,45,.18), transparent 55%),
    radial-gradient(900px 600px at 90% 10%, rgba(20,27,43,.10), transparent 50%),
    linear-gradient(165deg, #f7f3ee 0%, #eef2f7 42%, #f4ebe4 100%);
  -webkit-font-smoothing:antialiased;
}
.hubly-mark{display:block;height:clamp(44px,6vw,64px);width:auto;object-fit:contain}
a{color:inherit}

.shell{
  width:min(720px, calc(100% - 32px));
  margin:0 auto;
  padding:28px 0 72px;
}
.layout{
  display:grid;
  gap:20px;
}
@media (min-width:860px){
  .layout{
    grid-template-columns:minmax(0,1fr) 240px;
    align-items:start;
  }
  .booking-panel{position:sticky;top:16px}
}
.top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:clamp(24px,5vh,48px);
  opacity:0;animation:rise .7s .05s ease forwards;
}
.top-link{
  font-size:13px;font-weight:600;color:var(--ink-2);
  text-decoration:none;border-bottom:1px solid transparent;
}
.top-link:hover{border-color:var(--ink-3)}

.hero{text-align:center;opacity:0;animation:rise .75s .12s ease forwards}
.hero .mark-wrap{display:flex;justify-content:center;margin-bottom:22px}
.hero h1{
  font-family:var(--display);
  font-weight:800;
  font-size:clamp(1.55rem, 4.2vw, 2.35rem);
  letter-spacing:-.03em;
  line-height:1.15;
  color:var(--navy);
  margin-bottom:10px;
}
.hero p{
  font-size:clamp(15px, 2.2vw, 17px);
  color:var(--ink-2);
  max-width:36ch;
  margin:0 auto 28px;
  line-height:1.45;
}

.composer{
  background:var(--surface);
  backdrop-filter:blur(14px);
  border:1px solid var(--line);
  border-radius:22px;
  padding:14px 14px 12px;
  box-shadow:0 18px 50px rgba(20,27,43,.08);
  text-align:left;
  opacity:0;animation:rise .8s .22s ease forwards;
}
.composer textarea{
  width:100%;
  min-height:96px;
  resize:none;
  border:0;
  outline:none;
  background:transparent;
  font:inherit;
  font-size:17px;
  line-height:1.45;
  color:var(--ink);
  padding:8px 8px 4px;
}
.composer textarea::placeholder{color:var(--ink-3)}
.composer-bar{
  display:flex;align-items:center;justify-content:flex-end;gap:10px;
  padding-top:8px;border-top:1px solid var(--line);margin-top:6px;
}
.btn{
  appearance:none;border:0;cursor:pointer;
  font-family:var(--display);font-weight:700;font-size:14px;
  border-radius:12px;padding:11px 18px;
  transition:transform .15s ease, background .15s ease, opacity .15s ease;
}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-brand{background:var(--brand);color:#fff}
.btn-brand:hover{background:var(--brand-dark)}
.btn-ghost{
  background:transparent;color:var(--ink-2);
  border:1px solid var(--line);padding:10px 14px;
}
.btn-ghost:hover{background:rgba(20,27,43,.04)}

.prompts{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px 10px;
  margin-top:18px;
  opacity:0;animation:rise .8s .34s ease forwards;
}
.prompt{
  appearance:none;border:0;cursor:pointer;
  background:transparent;
  color:var(--ink-2);
  font:inherit;font-size:13px;font-weight:600;
  padding:6px 2px;
  border-bottom:1px solid rgba(20,27,43,.18);
  transition:color .15s ease, border-color .15s ease;
}
.prompt:hover{color:var(--brand);border-color:var(--brand)}

.thread{margin-top:28px;display:grid;gap:12px}
.bubble{
  max-width:92%;
  padding:14px 16px;
  border-radius:16px;
  font-size:15px;line-height:1.5;
  white-space:pre-wrap;
  opacity:0;animation:rise .45s ease forwards;
}
.bubble.user{
  margin-left:auto;
  background:var(--navy);color:#fff;
  border-bottom-right-radius:6px;
}
.bubble.hubly{
  margin-right:auto;
  background:rgba(255,255,255,.9);
  border:1px solid var(--line);
  border-bottom-left-radius:6px;
  color:var(--ink);
}
.followups{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-top:4px;justify-content:flex-start;
}
.followups button{
  text-align:center;
  appearance:none;cursor:pointer;
  background:rgba(255,255,255,.9);
  border:1px solid var(--line);
  border-radius:999px;
  padding:9px 14px;
  font:inherit;font-size:13px;font-weight:700;color:var(--ink);
  transition:border-color .15s ease, transform .15s ease, color .15s ease;
}
.followups button:hover{border-color:var(--brand);color:var(--brand);transform:translateY(-1px)}

.booking-panel{
  display:none;
  background:rgba(255,255,255,.9);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px 14px 12px;
  box-shadow:0 10px 28px rgba(20,27,43,.06);
}
.booking-panel.visible{display:block;animation:rise .4s ease}
.booking-panel h3{
  font-family:var(--display);font-size:13px;font-weight:800;
  color:var(--navy);margin-bottom:10px;letter-spacing:-.01em;
}
.booking-panel ul{list-style:none;display:grid;gap:7px}
.booking-panel li{
  font-size:13px;font-weight:600;color:var(--ink-2);
  display:flex;gap:8px;align-items:flex-start;
}
.booking-panel li .mark{
  flex-shrink:0;width:16px;text-align:center;
  color:var(--brand);font-weight:800;
}
.booking-panel li.pending{color:var(--ink-3);font-weight:500}
.booking-panel li.pending .mark{color:var(--ink-3)}

.confirm-card{
  margin-right:auto;
  max-width:100%;
  background:rgba(255,255,255,.94);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px 16px 14px;
  box-shadow:0 12px 32px rgba(20,27,43,.06);
  opacity:0;animation:rise .45s ease forwards;
}
.confirm-card h4{
  font-family:var(--display);font-size:1.1rem;font-weight:800;
  color:var(--navy);letter-spacing:-.02em;margin-bottom:12px;
}
.confirm-rows{display:grid;gap:8px;margin-bottom:12px}
.confirm-row{
  display:grid;grid-template-columns:120px 1fr;gap:8px;
  font-size:14px;
}
.confirm-row .k{color:var(--ink-3);font-weight:600}
.confirm-row .v{color:var(--ink);font-weight:700}
.confirm-row.pending .v{color:var(--ink-3);font-weight:500}
.confirm-ask{
  font-size:13px;color:var(--ink-3);margin-bottom:12px;
}
.confirm-actions{display:flex;flex-wrap:wrap;gap:8px}

.matches{margin-top:36px}
.matches-h{
  font-family:var(--display);font-weight:800;font-size:1.4rem;
  letter-spacing:-.02em;color:var(--navy);
  margin-bottom:6px;
  opacity:0;animation:rise .5s ease forwards;
}
.matches-sub{
  font-size:14px;color:var(--ink-2);line-height:1.45;
  margin-bottom:18px;
  opacity:0;animation:rise .55s .05s ease forwards;
}
.match-explain{
  margin:0 0 22px;
  opacity:0;animation:rise .55s .08s ease forwards;
}
.match-explain .looked{
  font-size:14px;color:var(--ink-2);font-weight:600;
  margin:10px 0 8px;
}
.match-explain ul{
  list-style:none;margin:0 0 14px;padding:0;
  display:grid;gap:6px;
}
.match-explain li{
  font-size:14px;font-weight:700;color:var(--navy);
  padding-left:1.15em;position:relative;line-height:1.35;
}
.match-explain li::before{
  content:"";
  position:absolute;left:0;top:.55em;
  width:6px;height:6px;border-radius:50%;
  background:var(--brand);
}
.match-explain .outro{
  font-family:var(--display);font-weight:800;font-size:1.05rem;
  color:var(--navy);letter-spacing:-.02em;
  margin-bottom:4px;
}
.rec-list{display:grid;gap:18px}

.rec{
  background:rgba(255,255,255,.92);
  border:1px solid var(--line);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 14px 40px rgba(20,27,43,.06);
  opacity:0;animation:rise .55s ease forwards;
}
.rec:nth-child(1){animation-delay:.06s}
.rec:nth-child(2){animation-delay:.14s}
.rec:nth-child(3){animation-delay:.22s}

.rec-hero{
  position:relative;
  height:148px;
  background:
    linear-gradient(135deg, rgba(20,27,43,.55), rgba(217,99,45,.35)),
    linear-gradient(160deg, #2a3348, #1a2233);
  background-size:cover;
  background-position:center;
}
.rec-hero.has-img{background-color:#1a2233}
.rec-role{
  position:absolute;left:14px;top:14px;
  font-family:var(--display);font-weight:800;font-size:12px;
  letter-spacing:.02em;
  background:rgba(255,255,255,.95);color:var(--navy);
  padding:6px 10px;border-radius:999px;
}
.rec-body{padding:0 18px 18px}
.rec-identity{
  display:flex;align-items:flex-end;gap:12px;
  margin-top:-28px;margin-bottom:12px;
}
.rec-logo{
  width:56px;height:56px;border-radius:14px;
  object-fit:cover;background:#fff;
  border:3px solid #fff;
  box-shadow:0 6px 16px rgba(20,27,43,.12);
  flex-shrink:0;
}
.rec-logo.placeholder{
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-weight:800;font-size:18px;
  color:var(--brand);background:#fff;
}
.rec-name-wrap{padding-bottom:2px;min-width:0;flex:1}
.rec-name{
  font-family:var(--display);font-weight:800;font-size:1.1rem;
  color:var(--navy);line-height:1.2;
}
.rec-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.badge{
  font-size:11px;font-weight:700;
  padding:4px 8px;border-radius:999px;
  background:rgba(20,27,43,.06);color:var(--ink-2);
}
.badge.verified{background:rgba(46,204,113,.14);color:#1a7a40}
.badge.conf{background:rgba(217,99,45,.12);color:var(--brand-dark)}
.badge.instant{background:rgba(26,79,160,.10);color:#1a4fa0}

.rec-highlights{
  display:flex;flex-wrap:wrap;gap:8px;
  margin:10px 0 12px;
}
.chip{
  font-size:12px;font-weight:700;
  padding:5px 9px;border-radius:999px;
  background:rgba(20,27,43,.05);color:var(--ink-2);
}
.chip.avail{background:rgba(46,204,113,.12);color:#1a7a40}
.chip.spec{background:rgba(217,99,45,.10);color:var(--brand-dark)}

.trust-row{
  display:flex;flex-wrap:wrap;gap:6px;
  margin:0 0 12px;
}
.trust{
  font-size:11px;font-weight:700;
  padding:4px 8px;border-radius:8px;
  background:rgba(20,27,43,.04);color:var(--ink-2);
}
.trust.on{background:rgba(46,204,113,.12);color:#1a7a40}

.ai-box{
  background:rgba(20,27,43,.03);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:14px;
}
.ai-box h3{
  font-family:var(--display);font-size:12px;font-weight:800;
  letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);
  margin-bottom:8px;
}
.ai-box .summary{
  font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;
  margin-bottom:8px;
}
.ai-box ul{list-style:none;display:grid;gap:5px}
.ai-box li{
  font-size:13px;color:var(--ink-2);
  padding-left:14px;position:relative;
}
.ai-box li::before{
  content:"";position:absolute;left:0;top:.55em;
  width:6px;height:6px;border-radius:50%;background:var(--brand);
}
.role-ladder{
  display:flex;flex-wrap:wrap;gap:6px 10px;
  font-size:12px;font-weight:700;color:var(--ink-3);
  margin:0 0 16px;
  opacity:0;animation:rise .5s .08s ease forwards;
}
.role-ladder span{color:var(--ink-2)}
.role-ladder .sep{color:var(--ink-4);font-weight:500}

.more-wrap{margin-top:28px}
.more-toggle{
  width:100%;
  text-align:left;
  appearance:none;cursor:pointer;
  background:transparent;
  border:0;
  padding:8px 0;
  font-family:var(--display);font-weight:700;font-size:14px;
  color:var(--ink-2);
  border-bottom:1px solid var(--line);
}
.more-toggle:hover{color:var(--brand)}
.more-list{display:none;grid-gap:18px;margin-top:16px}
.more-list.open{display:grid}

.status{
  margin-top:10px;font-size:13px;color:var(--ink-3);min-height:1.2em;
}
.status.err{color:#b02a2a}
.status.ok{color:#1a7a40}

/* Phase 4 — Booking Engine wizard */
.bk-overlay{
  position:fixed;inset:0;z-index:80;
  background:rgba(20,27,43,.48);
  display:none;align-items:flex-end;justify-content:center;
  padding:12px;
}
.bk-overlay.open{display:flex;animation:rise .25s ease}
.bk-sheet{
  width:min(560px,100%);
  max-height:min(92vh,820px);
  overflow:auto;
  background:#fff;
  border-radius:22px 22px 16px 16px;
  box-shadow:0 24px 60px rgba(20,27,43,.28);
  padding:18px 18px 22px;
}
.bk-top{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:14px;
}
.bk-top h2{
  font-family:var(--display);font-weight:800;font-size:1.15rem;
  color:var(--navy);letter-spacing:-.02em;
}
.bk-close{
  border:0;background:rgba(20,27,43,.06);color:var(--ink-2);
  width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;
}
.bk-steps{
  display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;
}
.bk-steps span{
  font-size:11px;font-weight:700;color:var(--ink-3);
  padding:4px 8px;border-radius:999px;background:rgba(20,27,43,.05);
}
.bk-steps span.on{background:rgba(217,99,45,.14);color:var(--brand-dark)}
.bk-steps span.done{color:var(--navy)}
.bk-body{display:grid;gap:12px}
.bk-body h3{
  font-family:var(--display);font-weight:800;font-size:1.05rem;
  color:var(--navy);letter-spacing:-.02em;
}
.bk-body p{font-size:14px;color:var(--ink-2);line-height:1.45}
.bk-svc{
  border:1px solid var(--line);border-radius:14px;padding:12px 14px;
  cursor:pointer;text-align:left;background:#fff;
  transition:border-color .15s, transform .15s;
}
.bk-svc:hover{border-color:rgba(217,99,45,.45);transform:translateY(-1px)}
.bk-svc.selected{border-color:var(--brand);box-shadow:0 0 0 2px rgba(217,99,45,.18)}
.bk-svc .nm{font-weight:800;color:var(--navy);font-size:15px}
.bk-svc .meta{font-size:12px;color:var(--ink-3);margin-top:4px;font-weight:600}
.bk-svc .desc{font-size:13px;color:var(--ink-2);margin-top:6px;line-height:1.4}
.bk-svc ul{margin:8px 0 0;padding-left:1.1em;font-size:12px;color:var(--ink-2)}
.bk-day{margin-top:8px}
.bk-day .dlabel{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:6px}
.bk-slots{display:flex;flex-wrap:wrap;gap:8px}
.bk-slot{
  border:1px solid var(--line);background:#fff;border-radius:10px;
  padding:8px 11px;font-size:13px;font-weight:700;cursor:pointer;color:var(--navy);
}
.bk-slot.selected{background:var(--brand);border-color:var(--brand);color:#fff}
.bk-row{display:grid;gap:8px}
.bk-row input{
  width:100%;border:1px solid var(--line);border-radius:10px;
  padding:11px 12px;font:inherit;font-size:14px;background:#fff;outline:none;
}
.bk-row input:focus{border-color:rgba(217,99,45,.55)}
.bk-pay{
  border:1px solid var(--line);border-radius:14px;padding:12px 14px;
  background:rgba(20,27,43,.03);
}
.bk-pay .rule{font-weight:800;color:var(--navy);font-size:14px}
.bk-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.bk-confirm .code{
  font-family:var(--display);font-weight:800;font-size:1.3rem;color:var(--brand);
  letter-spacing:.04em;margin:4px 0 10px;
}
.bk-confirm dl{display:grid;gap:8px;margin:12px 0}
.bk-confirm dt{font-size:11px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
.bk-confirm dd{font-size:14px;font-weight:700;color:var(--navy);margin:0 0 4px}
@media (min-width:640px){
  .bk-overlay{align-items:center}
  .bk-sheet{border-radius:22px}
}

@keyframes rise{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}

@media (max-width:520px){
  .shell{width:calc(100% - 24px);padding-top:18px}
  .composer textarea{min-height:110px;font-size:16px}
  .rec-hero{height:128px}
}
</style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <a href="/" aria-label="Hubly home">
        <img class="hubly-mark" src="/assets/hubly-wordmark.svg?v=3" alt="hubly" style="height:28px">
      </a>
      <a class="top-link" href="/">For businesses</a>
    </header>

    <div class="layout">
      <div class="main-col">
        <section class="hero" id="entry">
          <div class="mark-wrap">
            <img class="hubly-mark" src="/assets/hubly-wordmark.svg?v=3" alt="hubly">
          </div>
          <h1>What can we help you get done today?</h1>
          <p>Tell me what you’re trying to get done. I’ll find the right pro and get you booked.</p>

          <div class="composer">
            <textarea id="need-input" placeholder="Tell me what you’re trying to get done…" rows="3" autocomplete="off"></textarea>
            <div class="composer-bar">
              <button type="button" class="btn btn-brand" id="send-btn">Get Matched</button>

          <div class="prompts" id="prompts" aria-label="Suggested requests"></div>
        </section>

        <div class="thread" id="thread" hidden></div>
        <div class="matches" id="matches" hidden></div>
        <div class="status" id="status"></div>
      </div>

      <aside class="booking-panel" id="booking-panel" aria-live="polite">
        <h3 id="booking-title">Building Your Booking</h3>
        <ul id="booking-list"></ul>
      </aside>
    </div>
  </div>

  <div class="bk-overlay" id="bk-overlay" hidden>
    <div class="bk-sheet" role="dialog" aria-modal="true" aria-labelledby="bk-title">
      <div class="bk-top">
        <h2 id="bk-title">Book with Hubly</h2>
        <button type="button" class="bk-close" id="bk-close" aria-label="Close">×</button>
      </div>
      <div class="bk-steps" id="bk-steps"></div>
      <div class="bk-body" id="bk-body"></div>
      <div class="status" id="bk-status"></div>
    </div>
  </div>

<script>
(function () {

  const DEFAULT_PROMPTS = [

  /** Intake follow_ups are Hubly questions — never paint them as user bubbles. */
  function looksLikeHublyQuestion(text) {
    const t = String(text || '').trim();
    if (!t) return false;
    if (/\?\s*$/.test(t)) return true;
    return /^(what|which|when|where|who|how|is this|are |do |does |did |can |could |would |need |about how|interior,|residential)\b/i
      .test(t);
  }

  /** Map Hubly questions → short answers the customer can tap. */
  function answerChoicesForFollowUp(q) {
    const ql = String(q || '').toLowerCase();
    if (/interior|exterior/.test(ql) && /both|or/.test(ql)) {
      return ['Interior', 'Exterior', 'Both'];
    }
    if (/residential|commercial/.test(ql)) {
      return ['Residential', 'Commercial'];
    }
    if (/when|asap|this week|timing|schedule|need it|how soon/.test(ql)) {
      return ['ASAP', 'This week', "I'm flexible"];
    }
    if (/dirty|clutter|sanitiz|organizing|surfaces/.test(ql) && /or|both|main/.test(ql)) {
      return ['Dirty surfaces', 'Clutter / organizing', 'Both'];
    }
    if (/cleaning|organizing|sanitiz/.test(ql) && /or|about/.test(ql)) {
      return ['House cleaning', 'Organizing clutter', 'Deep sanitizing'];
    }
    if (
      /area\(s\)|which room|priority|need the most help/.test(ql) ||
      (/(kitchen|bathroom|floor|clutter|bedroom|living)/.test(ql) &&
        /(kitchen|bathroom|floor|clutter|bedroom|living|area|room|help|priority)/.test(ql))
    ) {
      return ['Kitchen', 'Bathrooms', 'Floors', 'Clutter'];
    }
    if (/how many windows|about how many/.test(ql)) {
      return ['Under 10', '10–20', '20+'];
    }
    if (/one-time|recurring/.test(ql)) {
      return ['One-time', 'Recurring'];
    }
    if (/suv or truck|truck or suv|what (kind|type) of (vehicle|car)/.test(ql)) {
      return ['Sedan', 'SUV', 'Truck'];
    }
    return null;
  }

  function showFollowUps(questions) {
    if (!questions || !questions.length) return;
    threadEl.querySelectorAll('.followups').forEach((el) => el.remove());

    const wrap = document.createElement('div');
    wrap.className = 'followups';
    const seen = new Set();
    let openHint = '';

    questions.forEach((q) => {
      const answers = answerChoicesForFollowUp(q);
      if (answers && answers.length) {
        answers.forEach((a) => {
          const key = a.toLowerCase();
          if (seen.has(key)) return;
          seen.add(key);
          const b = document.createElement('button');
          b.type = 'button';
          b.textContent = a;
          b.addEventListener('click', () => {
            wrap.remove();
            submitNeed(a);
          });
          wrap.appendChild(b);
        });
        return;
      }
      // Open-ended (city, free text): keep Hubly's question in its bubble only.
      if (looksLikeHublyQuestion(q) && !openHint) openHint = q;
    });

    if (!wrap.childNodes.length) {
      if (openHint) {
        input.placeholder = openHint.replace(/\?\s*$/, '') + '…';
        input.focus();
      }
      return;
    }

    threadEl.appendChild(wrap);
    if (openHint && !input.value) {
      input.placeholder = openHint.replace(/\?\s*$/, '') + '…';
    }
  }

  async function api(body) {
    const res = await fetch(SUPA_URL + '/functions/v1/marketplace', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        apikey: SUPA_KEY,
        Authorization: 'Bearer ' + SUPA_KEY,
      },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Something went wrong');
    return data;

  function money(n) {
    if (n == null || !Number.isFinite(Number(n))) return null;
    return '$' + Math.round(Number(n));
  }

  function initials(name) {
    const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return 'H';
    return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
  }

  function moneyCents(c) {
    if (c == null || !Number.isFinite(Number(c))) return null;
    const n = Number(c) / 100;
    return '$' + n.toFixed(n % 1 === 0 ? 0 : 2);
  }

  function fmtWhen(iso) {
    if (!iso) return '—';
    // Slot times are wall-clock labeled as Z — format without TZ shift
    const s = String(iso);
    const date = s.slice(0, 10);
    const hm = s.slice(11, 16);
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date) || !/^\d{2}:\d{2}$/.test(hm)) {
      return s;
    }
    const [y, mo, d] = date.split('-').map(Number);
    const [hh, mm] = hm.split(':').map(Number);
    const h12 = (hh % 12) || 12;
    const ap = hh >= 12 ? 'PM' : 'AM';
    let day = date;
    try {
      day = new Date(y, mo - 1, d).toLocaleDateString(undefined, {
        weekday: 'short', month: 'short', day: 'numeric',
      });
    } catch (_) {}
    return day + ' · ' + h12 + ':' + String(mm).padStart(2, '0') + ' ' + ap;
  }

        document.getElementById('bk-back').onclick = () => { bk.step = 1; renderBookingStep(); };
        document.getElementById('bk-request').onclick = async () => {

          try {
            const res = await api({
              action: 'request',

          (bk.match.instant_book ? 'Confirm Booking' : 'Request Booking') +
        '</button>' +
      '</div>';
    document.getElementById('bk-back').onclick = () => { bk.step = 3; renderBookingStep(); };
    document.getElementById('bk-submit').onclick = submitBookingCreate;
  }

  async function submitBookingCreate() {
    const name = document.getElementById('bk-name').value.trim();
    const email = document.getElementById('bk-email').value.trim();
    const phone = document.getElementById('bk-phone').value.trim();
    const address = document.getElementById('bk-address').value.trim();
    bk.customer = { name, email, phone, address };
    if (!name) { setBkStatus('Name is required', 'err'); return; }
    if (!email && !phone) { setBkStatus('Email or phone is required', 'err'); return; }
    setBkStatus('Confirming your appointment…');
    try {
      const res = await api({
        action: 'booking_create',
        provider_id: bk.match.provider_id,
        business_id: bk.match.business_id,
        service_id: bk.service.id,
        starts_at: bk.slot.starts_at,
        customer_name: name,
        customer_email: email,
        customer_phone: phone,
        address: address,
        notes: (lastNeed && (lastNeed.notes || lastNeed.service_text)) || '',
        why: bk.match.why || [],
      });
      bk.confirmation = res.confirmation;
      bk.payment = (res.confirmation && res.confirmation.payment) || bk.payment;

      // Required checkout when provider requires deposit / pay in full
      if (res.checkout && res.checkout.required && res.checkout.amount_cents >= 50) {
        const bookingId = res.confirmation && res.confirmation.booking_id;
        try {
          const origin = location.origin;
          const checkoutRes = await fetch(SUPA_URL + '/functions/v1/create-booking-checkout', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              apikey: SUPA_KEY,
              Authorization: 'Bearer ' + SUPA_KEY,
            },
            body: JSON.stringify({
              business_id: bk.match.business_id,
              marketplace_booking_id: bookingId,
              customer_name: name,
              customer_email: email,
              customer_phone: phone,
              service_name: bk.service.name,
              booking: {
                customer_name: name,
                customer_email: email,
                customer_phone: phone,
                service_name: bk.service.name,
                marketplace_booking_id: bookingId,
              },
              success_url: origin + '/get-done?stripe_pay=success&booked=' + encodeURIComponent(bookingId || ''),
              cancel_url: origin + '/get-done?stripe_pay=cancel&booked=' + encodeURIComponent(bookingId || ''),
            }),
          }).then((r) => r.json());
          if (checkoutRes && checkoutRes.url) {
            location.href = checkoutRes.url;
            return;
          }
          throw new Error((checkoutRes && checkoutRes.error) || 'Could not start checkout');
        } catch (payErr) {
          if (bookingId) {
            try {
              await api({ action: 'booking_abandon', marketplace_booking_id: bookingId });
            } catch (_) { /* best-effort cancel */ }
          }
          setBkStatus(
            (payErr && payErr.message) || 'Payment could not be started. Your booking was not kept.',
            'err',
          );
          return;
        }
      }

      bk.step = 5;
      renderBookingStep();
    } catch (e) {
      setBkStatus(e.message || 'Could not complete booking', 'err');
    }
  }

  function renderStepConfirmation() {
    const c = bk.confirmation || {};
    const pay = c.payment || {};
    bkBody.innerHTML =
      '<div class="bk-confirm">' +
        '<h3>' + escapeHtml(c.headline || 'Booking confirmed') + '</h3>' +
        '<div class="code">' + escapeHtml(c.confirmation_code || '') + '</div>' +
        '<p>' + escapeHtml(c.what_happens_next || 'You’re all set.') + '</p>' +
        '<dl>' +
          '<dt>Provider</dt><dd>' + escapeHtml((c.provider && c.provider.name) || bk.match.name) + '</dd>' +
          '<dt>Service</dt><dd>' + escapeHtml((c.service && c.service.name) || (bk.service && bk.service.name) || '') + '</dd>' +
          '<dt>When</dt><dd>' + escapeHtml(c.when_label || fmtWhen(c.starts_at)) + '</dd>' +
          '<dt>Address</dt><dd>' + escapeHtml(c.address || bk.customer.address || 'Shared with provider') + '</dd>' +
          '<dt>Payment</dt><dd>' + escapeHtml(pay.rule_label || pay.rule || 'Pay after service') +
            (pay.price_cents != null ? ' · ' + escapeHtml(moneyCents(pay.price_cents) || '') : '') +
          '</dd>' +
          '<dt>Status</dt><dd>' + escapeHtml(c.status === 'confirmed' ? 'Confirmed' : 'Requested') + '</dd>' +
        '</dl>' +
        '<div class="bk-actions">' +
          '<button type="button" class="btn btn-brand" id="bk-done">Done</button>' +
        '</div>' +
      '</div>';
    setBkStatus('');
    document.getElementById('bk-done').onclick = closeBookingWizard;
  }

  function bindBooking(cardEl, m) {
    cardEl.querySelector('.book-cta').addEventListener('click', () => openBookingWizard(m));
  }

  document.getElementById('bk-close').addEventListener('click', closeBookingWizard);
  bkOverlay.addEventListener('click', (e) => {
    if (e.target === bkOverlay) closeBookingWizard();
  });

  function trustChips(t, m) {
    if (!t) t = {};
    const items = [];
    if (m.verified || t.verified) items.push(['Verified', true]);
    if (t.insured) items.push(['Insured', true]);
    if (t.licensed) items.push(['Licensed', true]);
    if (t.jobs_completed != null) items.push([t.jobs_completed + ' jobs completed', true]);
    if (t.repeat_customers) items.push(['Repeat customers', true]);
    if (t.avg_response) items.push([t.avg_response.replace(/^Usually responds /, 'Responds '), true]);
    if (t.cancellation_rate != null && t.cancellation_rate <= 10) {
      items.push(['Low cancellations', true]);
    }
    if (m.instant_book || t.instant_book) items.push(['Instant Book', true]);
    return items.map(([label, on]) =>
      '<span class="trust' + (on ? ' on' : '') + '">' + escapeHtml(label) + '</span>'
    ).join('');
  }

  function renderCard(m) {
    const card = document.createElement('article');
    card.className = 'rec';
    const cta = m.cta || (m.instant_book ? 'Book Now' : 'Request Booking');
    const start = money(m.starting_at);
    const role = m.role || 'Hubly Match';
    const why = (m.why || []).map((w) => '<li>' + escapeHtml(w) + '</li>').join('');
    const heroStyle = m.hero_photo
      ? 'background-image:linear-gradient(180deg,rgba(20,27,43,.15),rgba(20,27,43,.55)),url(\'' + String(m.hero_photo).replace(/'/g, '%27') + '\')'
      : '';
    const logoHtml = m.logo_url
      ? '<img class="rec-logo" src="' + escapeHtml(m.logo_url) + '" alt="">'
      : '<div class="rec-logo placeholder" aria-hidden="true">' + escapeHtml(initials(m.name)) + '</div>';

    const highlights = [
      m.available_label ? '<span class="chip avail">' + escapeHtml(m.available_label) + '</span>' : '',
      m.verified ? '<span class="chip">Verified</span>' : '',
      m.specialist_label ? '<span class="chip spec">' + escapeHtml(m.specialist_label) + '</span>' : '',
      start ? '<span class="chip">From ' + escapeHtml(start) + '</span>' : '',
      m.distance_label ? '<span class="chip">' + escapeHtml(m.distance_label) + '</span>' : '',
    ].join('');

    card.innerHTML =
      '<div class="rec-hero' + (m.hero_photo ? ' has-img' : '') + '" style="' + heroStyle + '">' +
        '<div class="rec-role">' + escapeHtml(role) + '</div>' +
      '</div>' +
      '<div class="rec-body">' +
        '<div class="rec-identity">' + logoHtml +
          '<div class="rec-name-wrap">' +
            '<div class="rec-name">' + escapeHtml(m.name) + '</div>' +
            (m.summary ? '<div style="font-size:13px;color:var(--ink-2);margin-top:4px;font-weight:600">' +
              escapeHtml(m.summary) + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="rec-highlights">' + highlights + '</div>' +
        '<div class="trust-row">' + trustChips(m.trust, m) + '</div>' +
        '<div class="ai-box">' +
          '<h3>' + escapeHtml(m.why_heading || 'Why Hubly matched them') + '</h3>' +
          '<ul>' + why + '</ul>' +
        '</div>' +
        '<button type="button" class="btn btn-brand book-cta">' + escapeHtml(cta) + '</button>' +
      '</div>';

    bindBooking(card, m);
    return card;
  }

  function renderMatches(payload) {
    matchesEl.hidden = false;
    const expl = payload.explanation || null;
    const headline = (expl && expl.intro) || payload.headline ||
      'We checked calendars first — then narrowed it to providers who can actually take your job.';
    const outro = (expl && expl.outro) || payload.subhead ||
      'These providers are bookable for your request — not a directory listing.';
    const looked = (expl && expl.looked_for_heading) ||
      'Before recommending anyone, we looked for businesses that:';
    const criteria = (expl && expl.criteria) || [];
    const ladder = payload.role_ladder || ['Best Match', 'Fastest Availability', 'Best Value', 'Browse More'];
    const primary = payload.recommendations || payload.matches || [];
    const more = payload.more_providers || [];
    const moreLabel = payload.more_label || 'Browse more providers that may also be a good fit';

    const criteriaHtml = criteria.length
      ? '<p class="looked">' + escapeHtml(looked) + '</p><ul>' +
          criteria.map((c) => '<li>' + escapeHtml(c) + '</li>').join('') +
        '</ul>'
      : '';

    matchesEl.innerHTML =
      '<div class="matches-h">' + escapeHtml(headline) + '</div>' +
      '<div class="match-explain">' +
        criteriaHtml +
        '<div class="outro">' + escapeHtml(outro) + '</div>' +
      '</div>' +
      '<div class="role-ladder">' +
        ladder.map((r, i) =>
          '<span>' + escapeHtml(r) + '</span>' +
          (i < ladder.length - 1 ? '<span class="sep">↓</span>' : '')
        ).join('') +
      '</div>' +
      '<div class="rec-list" id="rec-primary"></div>' +
      (more.length
        ? '<div class="more-wrap">' +
            '<button type="button" class="more-toggle" id="more-toggle">' + escapeHtml(moreLabel) + '</button>' +
            '<div class="more-list" id="more-list"></div>' +
          '</div>'
        : '');

    const list = matchesEl.querySelector('#rec-primary');
    if (!primary.length) {
      list.innerHTML = '<p style="color:var(--ink-2);font-size:14px;">No strong matches yet. Add a city or timing and try again.</p>';
      return;
    }
    primary.forEach((m) => list.appendChild(renderCard(m)));

    if (more.length) {
      const moreList = matchesEl.querySelector('#more-list');
      const toggle = matchesEl.querySelector('#more-toggle');
      more.forEach((m) => moreList.appendChild(renderCard(m)));
      toggle.addEventListener('click', () => {
        const open = moreList.classList.toggle('open');
        toggle.textContent = open ? 'Hide additional providers' : moreLabel;
      });
    }

    matchesEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  async function runMatch(need) {
    setStatus('Finding the right pros for you…');
    const payload = await api({ action: 'match', need: need || {} });
    lastNeed = payload.need || need;
    setStatus('');
    renderMatches(payload);
  }

  async function submitNeed(text) {
    const prompt = String(text || input.value || '').trim();
    if (!prompt || busy) return;
    busy = true;
    sendBtn.disabled = true;
    setStatus('');
    promptsEl.style.display = 'none';
    messages.push({ role: 'user', content: prompt });
    addBubble('user', prompt);
    input.value = '';
    try {
      const intake = await api({ action: 'intake', messages });
      if (intake.booking) renderBookingPanel(intake.booking, false);
      if (intake.reply) {
        messages.push({ role: 'assistant', content: intake.reply });
        addBubble('hubly', intake.reply);
      }
      lastNeed = intake.need || null;
      if (intake.job && intake.job.vehicle_type && lastNeed) {
        lastNeed.vehicle_type = intake.job.vehicle_type;
      }
      if (intake.ready_to_confirm && intake.confirmation) {
        showConfirmation(intake.confirmation, lastNeed, intake.booking);
      } else if (intake.ready_to_match) {
        await runMatch(intake.need);
      } else {
        showFollowUps(intake.follow_ups || []);
        if (intake.suggested_prompts) renderPrompts(intake.suggested_prompts);
      }
    } catch (e) {
      setStatus(e.message || 'Could not continue', 'err');
    } finally {
      busy = false;
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', () => submitNeed());
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitNeed();
    }
  });

  // Stripe Checkout return — show confirmation or cancel unpaid booking
  (async function handleStripeReturn() {
    const params = new URLSearchParams(location.search);
    const pay = params.get('stripe_pay');
    const booked = params.get('booked') || params.get('marketplace_booking_id');
    if (!pay || !booked) return;
    try {
      if (pay === 'cancel') {
        await api({ action: 'booking_abandon', marketplace_booking_id: booked });
        setStatus('Payment cancelled — your booking was not kept. Describe your job to try again.', 'err');
      } else if (pay === 'success') {
        const got = await api({ action: 'booking_get', booking_id: booked });
        const c = (got && got.confirmation) || {};
        bk = {
          step: 5,
          match: { name: (c.provider && c.provider.name) || 'Provider', why: [] },
          catalog: null,
          service: (c.service) || { name: '' },
          slotsPayload: null,
          slot: null,
          customer: { name: '', email: '', phone: '', address: c.address || '' },
          payment: c.payment || null,
          confirmation: Object.assign({}, c, {
            headline: c.payment_status === 'paid' || (c.payment && c.payment.payment_status === 'paid')
              ? 'Payment received — you’re booked'
              : (c.headline || 'Booking confirmed'),
          }),
        };
        bkOverlay.hidden = false;
        bkOverlay.classList.add('open');
        bkTitle.textContent = 'Booking confirmed';
        renderBookingStep();
        setStatus('Payment successful', 'ok');
      }
    } catch (e) {
      setStatus(e.message || 'Could not finalize payment return', 'err');
    }
    try {
      history.replaceState({}, '', location.pathname);
    } catch (_) { /* ignore */ }
  })();

  renderPrompts(DEFAULT_PROMPTS);
  api({ action: 'intake' }).then((boot) => {
    if (boot && boot.suggested_prompts) renderPrompts(boot.suggested_prompts);
  }).catch(() => {});

  // Homepage “Get matched” → /get-done?q=…
  (function seedFromQuery() {
    const params = new URLSearchParams(location.search);
    if (params.get('stripe_pay')) return;
    const q = (params.get('q') || '').trim();
    if (!q) return;
    input.value = q;
    try {
      history.replaceState({}, '', location.pathname);
    } catch (_) { /* ignore */ }
    submitNeed(q);
  })();
})();
</script>
</body>
